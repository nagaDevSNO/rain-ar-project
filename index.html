<!DOCTYPE html>
<html>
<head>
  <title>Rain AR</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <div style="position:absolute; top:10px; left:10px; background:white; padding:10px;">
    <label>Volume</label>
    <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
  </div>

  <a-scene embedded arjs>

    <!-- Use ONE of these -->

    <!-- OPTION 1: Hiro Marker -->
    <a-marker preset="hiro">

    <!-- OPTION 2: Custom Marker -->
    <!-- <a-marker type="pattern" url="marker.patt"> -->

      <a-entity 
        particle-system="preset: rain; color: #AAAAFF; particleCount: 500">
      </a-entity>

      <a-entity id="rainSound"
        sound="src: url(rain.mp3); autoplay: true; loop: true">
      </a-entity>
      <a-box color="red" position="0 0.5 0"></a-box>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

<script>
function setVolume(value) {
  const sound = document.querySelector('#rainSound');
  sound.components.sound.setVolume(value);
}
</script>

</body>
</html>
