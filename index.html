<!DOCTYPE html>
<html>
<head>
  <title>Rain AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <!-- Particle System (IMPORTANT) -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>

</head>

<body style="margin: 0; overflow: hidden;">


  <!-- UI Controls -->
  <div style="position:absolute; top:10px; left:10px; background:white; padding:10px; z-index:10;">
    <label>Volume</label>
    <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume(this.value)">
  </div>

  <!-- AR Scene -->
  <a-scene embedded arjs>

    <!-- Marker -->
    <a-marker preset="hiro" id="marker">

      <!-- Rain Effect -->
      <a-entity 
        position="0 2 0"
        particle-system="preset: rain; color: white; size: 2; particleCount: 2000">
      </a-entity>

      <!-- Video Asset -->
      <a-assets>
        <video id="rainVideo" src="rain.mp4" preload="auto" loop="true" webkit-playsinline playsinline></video>
      </a-assets>

      <!-- Rain Video -->
      <a-video 
        src="#rainVideo"
        width="2"
        height="1.2"
        position="0 1 0">
      </a-video>

      <!-- Sound -->
      <a-entity id="rainSound"
        sound="src: url(rain.mp3); autoplay: false; loop: true; volume: 0.5; preload: auto">
      </a-entity>
      <!-- <a-box color="red" position="0 0.5 0"></a-box> -->

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>
    

  </a-scene>

  <script>
  function setVolume(value) {
    const sound = document.querySelector('#rainSound');
    if (sound && sound.components.sound) {
      sound.components.sound.setVolume(value);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const marker = document.querySelector('#marker');
    const sound = document.querySelector('#rainSound');
    const video = document.querySelector('#rainVideo');

    if (marker) {
      marker.addEventListener('markerFound', () => {
        if (sound && sound.components.sound && !sound.components.sound.isPlaying) {
          sound.components.sound.playSound();
        }
        if (video) {
          video.play();
        }
      });

      marker.addEventListener('markerLost', () => {
        if (sound && sound.components.sound && sound.components.sound.isPlaying) {
          sound.components.sound.stopSound();
        }
        if (video) {
          video.pause();
        }
      });
    }
  });
  </script>

</body>
</html>
